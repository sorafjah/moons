<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>地球・月・太陽の大きさと距離</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  @font-face {
    font-family: 'BIZ UDGothic';
    src: local('BIZ UDGothic');
  }
  html, body {
    width:100%; height:100%; overflow:hidden;
    font-family: 'BIZ UDGothic', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #000;
    color:#fff;
  }
  #container { position:relative; width:100vw; height:100vh; }
  canvas { display:block; }

  /* 上部パネル */
  #topPanel {
    position:absolute; top:0; left:0; right:0;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
    z-index: 10;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  #objToggles, #modeButtons {
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  .sizeOnly.hidden { display:none; }
  #modeButtons { margin-left: auto; }
  h1 {
    font-size: 1.1rem;
    font-weight: bold;
    margin-right: auto;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .modeBtn {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 18px;
    border: 1px solid #555;
    background: rgba(30,30,40,0.85);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .modeBtn.active {
    background: rgba(30,30,40,0.85);
    border-color: #8fc4ff;
    font-weight: bold;
  }
  .modeBtn:hover { border-color: #8fc4ff; }

  /* オブジェクト表示切替チップ */
  .toggleChip {
    font-family: inherit;
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(20,20,28,0.5);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .toggleChip.active {
    background: rgba(95,174,95,0.25);
    border-color: #8fc4ff;
    color: #fff;
    font-weight: bold;
  }
  .toggleChip:hover { border-color: #8fc4ff; }

  /* 説明パネル */
  #infoPanel {
    position:absolute; bottom:0; left:0; right:0;
    padding: 14px 16px 18px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
    z-index: 10;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  #infoPanel .title {
    font-weight: bold;
    font-size: 1.05rem;
    margin-bottom: 6px;
    color: #ffd966;
  }
  #infoPanel .title.distance {
    color: #6fb3ff;
  }
  .dataRow {
    display:flex; flex-wrap:wrap; gap: 14px;
    margin-top: 6px;
  }
  .dataItem {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 0.85rem;
  }
  .dataItem b { color:#9fd8ff; }

  /* 操作説明 */
  #hint {
    position:absolute;
    bottom: 50%;
    left: 50%;
    transform: translate(-50%, 50%);
    background: rgba(0,0,0,0.6);
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 0.95rem;
    text-align:center;
    z-index: 20;
    pointer-events:none;
    transition: opacity 1s;
  }
  #hint.hidden { opacity: 0; }

  /* ローディング */
  #loading {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000; z-index:100;
    font-size:1.1rem;
  }
</style>
</head>
<body>
<div id="container">
  <div id="loading">読み込み中…</div>

  <div id="topPanel">
    <div id="objToggles">
      <button class="toggleChip sizeOnly active" data-obj="earth">地球</button>
      <button class="toggleChip sizeOnly" data-obj="moon">月</button>
      <button class="toggleChip sizeOnly" data-obj="sun">太陽</button>
      <button class="toggleChip" data-obj="info">説明</button>
    </div>
    <div id="modeButtons">
      <button class="modeBtn active" id="btnSize">大きさ比較モード</button>
      <button class="modeBtn" id="btnDistance">距離比較モード</button>
      <button class="modeBtn" id="btnReset">視点リセット</button>
    </div>
  </div>

  <div id="hint">ドラッグで視点回転 / ピンチ・スクロールで拡大縮小</div>

  <div id="infoPanel">
    <div class="title" id="infoTitle">大きさ比較モード</div>
    <div id="infoText">地球・月・太陽を実際の大きさの比率のまま、近づけて並べています。</div>
    <div class="dataRow" id="dataRow"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
// ============================================================
// 実際のデータ（km）
// ============================================================
const REAL = {
  earthRadius: 6371,
  moonRadius: 1737,
  sunRadius: 696000,
  earthMoonDist: 384400,
  earthSunDist: 149600000
};

// ============================================================
// シーン基本構築
// ============================================================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 1e9);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('container').appendChild(renderer.domElement);

// ラベル用CSS2Dレンダラー
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.getElementById('container').appendChild(labelRenderer.domElement);

function makeLabel(text, below) {
  const div = document.createElement('div');
  div.textContent = text;
  div.style.color = '#ffffff';
  div.style.fontFamily = "'BIZ UDGothic', 'Hiragino Sans', 'Meiryo', sans-serif";
  div.style.fontSize = '15px';
  div.style.fontWeight = 'bold';
  div.style.background = 'rgba(0,0,0,0.45)';
  div.style.padding = '2px 8px';
  div.style.borderRadius = '6px';
  div.style.whiteSpace = 'nowrap';
  div.style.transform = below ? 'translate(-50%, 30%)' : 'translate(-50%, -130%)';
  return new CSS2DObject(div);
}

// 星空背景
function createStarField(count, radius) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = radius * (0.6 + Math.random()*0.4);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2*Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: radius*0.0015, sizeAttenuation:true });
  return new THREE.Points(geo, mat);
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.6;
controls.zoomSpeed = 1.0;

// ============================================================
// テクスチャ（GitHub上の画像を読み込み）
// ============================================================
const textureLoader = new THREE.TextureLoader();
textureLoader.setCrossOrigin('anonymous');

const TEX_BASE = 'https://raw.githubusercontent.com/sorafjah/earth-moon-sun/main/';
const earthTex = textureLoader.load(TEX_BASE + 'earth1024.jpg');
const moonTex  = textureLoader.load(TEX_BASE + 'moon1024.jpg');
const sunTex   = textureLoader.load(TEX_BASE + 'sun1024.jpg');
[earthTex, moonTex, sunTex].forEach(tex => {
  tex.colorSpace = THREE.SRGBColorSpace;
});

// 月のテクスチャを経度方向に180°回転（東西反転）
moonTex.wrapS = THREE.RepeatWrapping;
moonTex.offset.x = 0.5;

// ============================================================
// ライト
// ============================================================
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);

// ============================================================
// オブジェクト管理
// ============================================================
let earthMesh, moonMesh, sunMesh, sunLight, stars;
let currentMode = 'size'; // 'size' or 'distance'

// 大きさ比較モードでの表示・非表示状態（デフォルトは地球のみ表示）
const visState = { earth: true, moon: false, sun: false, info: false };

function clearScene() {
  // CSS2Dラベルのdom要素を明示的に削除（残留防止）
  scene.traverse((obj) => {
    if (obj.isCSS2DObject && obj.element && obj.element.parentNode) {
      obj.element.parentNode.removeChild(obj.element);
    }
  });
  while (scene.children.length > 0) {
    const obj = scene.children[0];
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose());
      else obj.material.dispose();
    }
  }
  scene.add(ambient);
}

function makeSphere(radius, texture, emissive) {
  const geo = new THREE.SphereGeometry(radius, 64, 48);
  const mat = emissive
    ? new THREE.MeshBasicMaterial({ map: texture })
    : new THREE.MeshStandardMaterial({ map: texture, roughness: 0.9, metalness: 0.0 });
  return new THREE.Mesh(geo, mat);
}

// ------------------------------------------------------------
// モード1: 大きさ比較（実際の比率のまま、近くに並べる）
// ------------------------------------------------------------
function buildSizeMode() {
  clearScene();

  // スケール: 1 unit = 2000km とする（地球が半径3.18くらいになる）
  const SCALE = 2000;
  const rEarth = REAL.earthRadius / SCALE;   // ≈3.19
  const rMoon  = REAL.moonRadius / SCALE;    // ≈0.87
  const rSun   = REAL.sunRadius / SCALE;     // ≈348

  // 太陽は巨大なので、見やすいように少し離して配置
  // 地球と月は隙間をあけて並べる
  earthMesh = makeSphere(rEarth, earthTex, false);
  earthMesh.position.set(0, 0, 0);
  scene.add(earthMesh);

  moonMesh = makeSphere(rMoon, moonTex, false);
  moonMesh.position.set(rEarth + rMoon + 3, 0, 0);
  scene.add(moonMesh);

  sunMesh = makeSphere(rSun, sunTex, true);
  // 太陽は地球より遥かに大きいので、左側にやや離して配置
  sunMesh.position.set(-(rEarth + rSun + 40), 0, 0);
  scene.add(sunMesh);

  // 太陽から照らす平行光源 + 太陽自体は自照
  sunLight = new THREE.PointLight(0xffffff, 2.5, 0, 0);
  sunLight.position.copy(sunMesh.position);
  scene.add(sunLight);

  // 星空
  stars = createStarField(3000, rSun * 6);
  scene.add(stars);

  // 表示・非表示の状態を反映
  earthMesh.visible = visState.earth;
  moonMesh.visible = visState.moon;
  sunMesh.visible = visState.sun;
  document.querySelectorAll('.sizeOnly').forEach(el => el.classList.remove('hidden'));
  document.getElementById('infoPanel').style.display = visState.info ? '' : 'none';

  // カメラ位置: 地球が見やすい位置から開始
  camera.position.set(0, rEarth*0.6, rEarth*3.8);
  controls.target.set(0, 0, 0);
  controls.minDistance = rEarth*0.5;
  controls.maxDistance = rSun * 4;
  controls.update();

  updateInfoForSize();
}

// ------------------------------------------------------------
// モード2: 距離比較（実際の比率で配置）
// ------------------------------------------------------------
function buildDistanceMode() {
  clearScene();

  // 大きさ比較モード専用の地球・月・太陽の表示切替は隠す。説明欄は切替可能（デフォルト非表示）。
  document.querySelectorAll('.sizeOnly').forEach(el => el.classList.add('hidden'));
  document.getElementById('infoPanel').style.display = visState.info ? '' : 'none';

  // スケール: 1 unit = 6371km（地球半径=1）にする
  const SCALE = REAL.earthRadius;
  const rEarth = 1;
  const rMoon  = REAL.moonRadius / SCALE;     // ≈0.273
  const rSun   = REAL.sunRadius / SCALE;      // ≈109.2

  const distMoon = REAL.earthMoonDist / SCALE; // ≈60.3
  const distSun  = REAL.earthSunDist / SCALE;  // ≈23481

  earthMesh = makeSphere(rEarth, earthTex, false);
  earthMesh.position.set(0, 0, 0);
  scene.add(earthMesh);

  moonMesh = makeSphere(rMoon, moonTex, false);
  moonMesh.position.set(distMoon, 0, 0);
  scene.add(moonMesh);

  sunMesh = makeSphere(rSun, sunTex, true);
  // 太陽は反対方向（-X）に配置し、地球-月-太陽が一直線にならないよう少しYずらし軌道線で表現
  sunMesh.position.set(-distSun, 0, 0);
  scene.add(sunMesh);

  sunLight = new THREE.PointLight(0xffffff, 2.5, 0, 0);
  sunLight.position.copy(sunMesh.position);
  scene.add(sunLight);

  stars = createStarField(5000, distSun * 1.5);
  scene.add(stars);

  // ラベル（太陽・地球・月）
  const labelOffset = (distSun + distMoon) * 0.012; // 全体スケールに応じた一定オフセット
  const sunLabel = makeLabel('太陽');
  sunLabel.position.set(0, rSun + labelOffset, 0);
  sunMesh.add(sunLabel);

  const earthLabel = makeLabel('地球');
  earthLabel.position.set(0, labelOffset, 0);
  earthMesh.add(earthLabel);

  const moonLabel = makeLabel('月', true);
  moonLabel.position.set(0, -labelOffset, 0);
  moonMesh.add(moonLabel);

  // カメラ初期位置：太陽から月までの全体が画面に収まるように
  // 配置範囲は X方向に -distSun（太陽）〜 +distMoon（月）。中点を注視点にする。
  const spanX = distSun + distMoon;           // 全体の横幅
  const midX = (-distSun + distMoon) / 2;      // 中点
  // 視野角50°、横幅spanXが収まるのに必要なカメラ距離（余裕をもたせる）
  const fovRad = camera.fov * Math.PI / 180;
  const aspect = camera.aspect;
  // 横幅基準・縦幅基準の両方を満たす距離を取り、安全係数1.15
  const distForWidth  = (spanX / 2) / (Math.tan(fovRad / 2) * aspect);
  const camDist = distForWidth * 1.15;
  camera.position.set(midX, camDist * 0.25, camDist);
  controls.target.set(midX, 0, 0);
  controls.minDistance = rEarth * 1.2;
  controls.maxDistance = spanX * 2;
  controls.update();

  updateInfoForDistance();
}

// ============================================================
// 情報パネル更新
// ============================================================
function fmt(num) {
  return num.toLocaleString('ja-JP', {maximumFractionDigits: 1});
}

function updateInfoForSize() {
  document.getElementById('infoTitle').classList.remove('distance');
  document.getElementById('infoTitle').textContent = '大きさ比較モード';
  document.getElementById('infoText').textContent =
    '地球・月・太陽を、実際の半径の比率を保ったまま近くに並べています。';
  document.getElementById('dataRow').innerHTML = `
    <div class="dataItem">地球 半径: <b>${fmt(REAL.earthRadius)} km</b></div>
    <div class="dataItem">月 半径: <b>${fmt(REAL.moonRadius)} km</b>（地球の約${(REAL.earthRadius/REAL.moonRadius).toFixed(1)}分の1）</div>
    <div class="dataItem">太陽 半径: <b>${fmt(REAL.sunRadius)} km</b>（地球の約${(REAL.sunRadius/REAL.earthRadius).toFixed(0)}倍）</div>
  `;
}

function updateInfoForDistance() {
  document.getElementById('infoTitle').classList.add('distance');
  document.getElementById('infoTitle').textContent = '距離比較モード';
  document.getElementById('infoText').textContent =
    '実際の比率のまま月・太陽までの距離と大きさを再現しています。';
  document.getElementById('dataRow').innerHTML = `
    <div class="dataItem">地球-月の距離: <b>約${fmt(REAL.earthMoonDist)} km</b></div>
    <div class="dataItem">地球-太陽の距離: <b>約${fmt(REAL.earthSunDist)} km</b></div>
    <div class="dataItem">太陽までの距離は月までの約${(REAL.earthSunDist/REAL.earthMoonDist).toFixed(0)}倍</div>
  `;
}

// ============================================================
// 自転・公転アニメーション
// ============================================================
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.005;

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ============================================================
// イベント
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('btnSize').addEventListener('click', () => {
  if (currentMode === 'size') return;
  currentMode = 'size';
  document.getElementById('btnSize').classList.add('active');
  document.getElementById('btnDistance').classList.remove('active');
  buildSizeMode();
});

document.getElementById('btnDistance').addEventListener('click', () => {
  if (currentMode === 'distance') return;
  currentMode = 'distance';
  document.getElementById('btnDistance').classList.add('active');
  document.getElementById('btnSize').classList.remove('active');
  buildDistanceMode();
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (currentMode === 'size') buildSizeMode();
  else buildDistanceMode();
});

// 大きさ比較モード: 地球・月・太陽・説明の表示切替
document.querySelectorAll('.toggleChip').forEach(chip => {
  chip.addEventListener('click', () => {
    const key = chip.dataset.obj;
    visState[key] = !visState[key];
    chip.classList.toggle('active', visState[key]);

    switch (key) {
      case 'earth':
        if (earthMesh) earthMesh.visible = visState.earth;
        break;
      case 'moon':
        if (moonMesh) moonMesh.visible = visState.moon;
        break;
      case 'sun':
        if (sunMesh) sunMesh.visible = visState.sun;
        break;
      case 'info':
        document.getElementById('infoPanel').style.display = visState.info ? '' : 'none';
        break;
    }
  });
});

// ヒントを数秒後にフェードアウト
setTimeout(() => {
  document.getElementById('hint').classList.add('hidden');
}, 4000);

// ============================================================
// 初期化
// ============================================================
buildSizeMode();
document.getElementById('loading').style.display = 'none';
animate();
</script>
</body>
</html>
