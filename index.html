<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月の満ち欠け 3D</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #141b2e;
    --accent: #ffd34d;
    --text: #eef2ff;
    --sub: #9fb0d8;
    --line: #2a3550;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: "BIZ UDPGothic", "BIZ UDゴシック", system-ui, sans-serif;
    overflow: hidden;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
  #canvas-wrap { flex: 1; position: relative; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  .badge {
    position: absolute; top: calc(12px + env(safe-area-inset-top)); left: 12px;
    background: rgba(20,27,46,0.82); border: 1px solid var(--line);
    border-radius: 12px; padding: 8px 14px;
    font-size: 15px; font-weight: 700; letter-spacing: .02em;
  }
  .badge .sub { font-size: 12px; font-weight: 500; color: var(--sub); display:block; margin-top:2px; }

  .view-toggle {
    position: absolute; top: calc(12px + env(safe-area-inset-top)); right: 12px;
    background: #000; color: #fff;
    border: 1px solid #333; border-radius: 12px; padding: 10px 16px;
    font-size: 14px; font-weight: 800; cursor: pointer;
    font-family: inherit;
  }
  .view-toggle:active { transform: scale(.96); }

  .reset-btn {
    position: absolute; top: calc(64px + env(safe-area-inset-top)); right: 12px;
    background: rgba(20,27,46,0.82); color: var(--sub);
    border: 1px solid var(--line); border-radius: 10px; padding: 7px 12px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: inherit;
  }
  .reset-btn:active { transform: scale(.96); }

  .sun-label {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--accent); font-size: 13px; font-weight: 700; text-align: center;
    pointer-events: none; line-height: 1.3; opacity:.85;
  }
  .sun-label .arrow { font-size: 22px; display:block; }

  #controls {
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 14px 14px calc(12px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 12px;
  }
  #slider {
    -webkit-appearance: none; appearance: none; width: 100%; height: 8px;
    border-radius: 6px; background: linear-gradient(90deg, #15294d, #3a7bd5);
    outline: none; margin: 0;
  }
  #slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: #3a7bd5; border: 3px solid #0a1a33; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  #slider::-moz-range-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    background: #3a7bd5; border: 3px solid #0a1a33; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div class="badge" id="badge">新月<span class="sub" id="badge-sub">俯瞰視点</span></div>
    <button class="view-toggle" id="viewBtn">地球から見る</button>
    <button class="reset-btn" id="resetBtn">視点リセット</button>
    <div class="sun-label" id="sunLabel"><span class="arrow">←</span>太陽<br>（光）</div>
  </div>
  <div id="controls">
    <input type="range" id="slider" min="0" max="360" value="0" step="1">
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
wrap.appendChild(renderer.domElement);

const perspCam = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
const orthoCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
let camera = orthoCam;

// ---- テクスチャ ----
const texLoader = new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');
const earthTex = texLoader.load('earth1024.jpg');
const moonTex  = texLoader.load('moon1024.jpg');
earthTex.colorSpace = THREE.SRGBColorSpace;
moonTex.colorSpace  = THREE.SRGBColorSpace;

// ---- 太陽の光：右(+X) ----
const sunLight = new THREE.DirectionalLight(0xffffff, 2.2);
sunLight.position.set(50, 0, 0);
sunLight.target.position.set(0, 0, 0);
scene.add(sunLight);
scene.add(sunLight.target);
scene.add(new THREE.AmbientLight(0x223052, 0.5));

// ---- 地球 ----
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.4, 48, 48),
  new THREE.MeshStandardMaterial({ map: earthTex, roughness: 0.85, emissive: 0x0a1530, emissiveIntensity: .25 })
);
scene.add(earth);

// ---- 月：潮汐ロックの向き調整用にピボットでくるむ ----
// moonPivot を地球に向ける。moonMesh 側に「おなじみの面」を出すローカル回転を入れる。
const moonRadius = 0.55;
const moonPivot = new THREE.Object3D();
scene.add(moonPivot);
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(moonRadius, 48, 48),
  new THREE.MeshStandardMaterial({ map: moonTex, roughness: 1.0 })
);
moonPivot.add(moon);

// ★ 月テクスチャの向き合わせ
// moon1024.jpg は「画像の中心(U=0.5)が地球側の正面」になる標準的な等距円筒図法。
// SphereGeometry はデフォルトで U=0.5 が -Z 方向（経度0°が +Z 側）に来るため、
// そのままだと画像の左右端（裏側）が地球側を向いてしまう。
// Y軸に90°回転させることで、画像中心（表側＝ティコ等の高地クレーター＝「へそ」を含む面）
// が地球側（lookAt後のローカル -Z 方向）にくるようにする。
moon.rotation.set(0, Math.PI / 2, 0);

const orbitR = 5.0;
const orbit = new THREE.Mesh(
  new THREE.RingGeometry(orbitR - 0.02, orbitR + 0.02, 96),
  new THREE.MeshBasicMaterial({ color: 0x2a3550, side: THREE.DoubleSide })
);
orbit.rotation.x = -Math.PI / 2;
scene.add(orbit);

const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i=0;i<400;i++){
  starPos.push((Math.random()-0.5)*120,(Math.random()-0.5)*120,(Math.random()-0.5)*120);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x8899bb,size:0.18})));

let angle = 0;
let mode = 'top'; // 'top'(俯瞰) or 'earth'

function phaseName(a){
  a = ((a % 360) + 360) % 360;
  const W = 11;
  if (a < W || a >= 360-W) return '新月';
  if (Math.abs(a-90)  < W) return '上弦の月';
  if (Math.abs(a-180) < W) return '満月';
  if (Math.abs(a-270) < W) return '下弦の月';
  return '';
}

const LAT = 35 * Math.PI/180;

function observerDirFor(angleDeg){
  const a = angleDeg * Math.PI/180;
  const horiz = new THREE.Vector3(Math.cos(a), 0, -Math.sin(a));
  const dir = new THREE.Vector3(
    horiz.x * Math.cos(LAT),
    Math.sin(LAT),
    horiz.z * Math.cos(LAT)
  );
  return dir.normalize();
}

function moonPosFor(angleDeg){
  const a = angleDeg * Math.PI/180;
  return new THREE.Vector3(Math.cos(a)*orbitR, 0, -Math.sin(a)*orbitR);
}

function updateScene(){
  const mp = moonPosFor(angle);
  moonPivot.position.copy(mp);

  // ★ 潮汐ロック：ピボットを地球(原点)に向ける → 常に同じ面が地球側
  moonPivot.lookAt(0, 0, 0);

  const name = phaseName(angle);
  const badge = document.getElementById('badge');
  if(name){
    badge.style.display = '';
    badge.firstChild.textContent = name;
    document.getElementById('badge-sub').textContent = mode==='top' ? '俯瞰視点' : '地球から見た月';
  } else {
    badge.style.display = 'none';
  }
}

let controls = null;
function buildControls(){
  if(controls){ controls.dispose(); }
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.rotateSpeed = 0.6;
  controls.zoomSpeed = 0.7;

  if(mode==='top'){
    // 俯瞰：水平回転（方位角）は自由、上下（極角）は真上付近にゆるく制限
    controls.minPolarAngle = 0.05;            // ほぼ真上
    controls.maxPolarAngle = Math.PI * 0.45;  // 斜め見下ろしまで許可
    controls.enableZoom = true;
  } else {
    controls.minPolarAngle = 0;
    controls.maxPolarAngle = Math.PI;
  }
}

function setCamera(keepOrbit){
  const mp = moonPosFor(angle);
  if(mode==='top'){
    camera = orthoCam;
    if(!keepOrbit){
      camera.position.set(0, 13, 0.001);
      camera.up.set(0,1,0); // OrbitControlsの方位角回転を効かせるため up は +Y
    }
    orbit.visible = true;
    earth.visible = true;
  } else {
    camera = perspCam;
    if(!keepOrbit){
      const obsDir = observerDirFor(angle);
      const obsPos = obsDir.clone().multiplyScalar(1.4);
      const camPos = obsPos.clone()
        .add(obsDir.clone().multiplyScalar(-0.25))
        .add(new THREE.Vector3(0, -1.6, 0));
      camera.position.copy(camPos);
      camera.up.copy(new THREE.Vector3(0,1,0));
    }
    orbit.visible = false;
    earth.visible = false;
  }
  updateCamProjection();
  buildControls();
  controls.target.copy(mode==='top' ? new THREE.Vector3(0,0,0) : mp);
  if(!keepOrbit){ camera.lookAt(controls.target); }
  controls.update();
}

function updateCamProjection(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const aspect = w/h;
  if(camera === orthoCam){
    const viewSize = 14;
    orthoCam.left = -viewSize*aspect/2;
    orthoCam.right = viewSize*aspect/2;
    orthoCam.top = viewSize/2;
    orthoCam.bottom = -viewSize/2;
    orthoCam.updateProjectionMatrix();
  } else {
    perspCam.aspect = aspect;
    perspCam.updateProjectionMatrix();
  }
}

const slider = document.getElementById('slider');
function setAngle(a){
  angle = ((a % 360) + 360) % 360;
  slider.value = angle;
  updateScene();
  if(controls){
    const mp = moonPosFor(angle);
    if(mode==='earth'){
      controls.target.copy(mp);
      controls.update();
    }
  }
}
slider.addEventListener('input', ()=>{
  setAngle(parseInt(slider.value));
});

const viewBtn = document.getElementById('viewBtn');
viewBtn.addEventListener('click', ()=>{
  mode = mode==='top' ? 'earth' : 'top';
  viewBtn.textContent = mode==='top' ? '地球から見る' : '俯瞰で見る';
  updateScene(); setCamera(false);
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  setCamera(false);
});

function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w,h);
  updateCamProjection();
}
window.addEventListener('resize', resize);

function animate(){
  requestAnimationFrame(animate);
  if(controls) controls.update();
  renderer.render(scene, camera);
}
resize(); updateScene(); setCamera(false); animate();
</script>
</body>
</html>
